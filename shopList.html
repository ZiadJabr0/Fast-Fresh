<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f1c2c">
    <title>Fit & Fresh — Shopping List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- navbar -->
    <div id="bootstrap-navbar">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <h1 class="navbar-brand">Fast and Fresh</h1>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                    aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarText">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="shopList.html">Shopping List</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="recipes.html">Recipe Finder</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Fast & Fresh</h2>
        <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a class="active" href="shopList.html">🛒 Shopping List</a></li>
            <li><a href="recipes.html">🍳 Recipes</a></li>
        </ul>
        <div class="sidebar-footer">
            <p>© 2026 Fast & Fresh</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Shopping List</h1>
        <p>Keep track of the essentials you need to buy. Items save automatically in your browser.</p>
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Add an item">
            <button class="shopBtn" onclick="addItem()">Add</button>
        </div>
        <div class="actions">
            <button class="shopBtn" onclick="clearList()">Clear list</button>
        </div>
        <ul id="shoppingList"></ul>
        <p id="emptyState" class="muted">Your list is empty. Add an item to get started.</p>
    </div>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="shopList.js"></script>

</body>

</html>
