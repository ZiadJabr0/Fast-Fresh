<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f1c2c">
    <title>Fast & Fresh — Recipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- navbar -->
    <div id="bootstrap-navbar">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <h1 class="navbar-brand">Fast and Fresh</h1>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                    aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarText">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active"  href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="shopList.html">Shopping List</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="recipes.html">Recipe Finder</a>
                        </li>
                    </ul>
                    <span class="navbar-text"></span>
                    </span>
                </div>
            </div>
        </nav>
    </div>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Fast & Fresh</h2>
        <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="shopList.html">🛒 Shopping List</a></li>
            <li><a class="active" href="recipes.html">🍳 Recipes</a></li>
        </ul>
        <div class="sidebar-footer">
            <p>© 2026 Fit & Fresh</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Recipes</h1>
        <p>Search recipes and add required ingredients straight to your shopping list.</p>

        <div class="search-bar">
            <input type="text" id="recipeSearch" placeholder="🔍 Search recipes..." class="searchInput">

            <select id="categoryFilter" class="filter">
                <option value="">Category</option>
            </select>

            <select id="areaFilter" class="filter">
                <option value="">Cuisine</option>
            </select>

            <input type="text" id="ingredientFilter" placeholder="Ingredient" class="searchInput">

            <button onclick="searchRecipe()" class="RCPbutton">Go</button>
            <button onclick="resetFilters()" class="RCPbutton">✖</button>
        </div>

        <div id="recipes"></div>
        <div id="toast" class="toast" aria-live="polite"></div>

        <div id="floatingWindow" class="modal"></div>

    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="recipes.js"></script>

</body>

</html>
